            if (pathManager) pathManager.hideAllVolumes();
        }

        // hides volume and disable trigger
        function ShowVolume(name) {
            // Hem görsel olarak gizle hem de PathManager mantığından çıkar
            if (pathManager) pathManager.setVolumeEnabled(name, true);

            scene.traverse(function (object) {
                if (object.name === name) {
                    object.visible = false;
                }
            });
        }

        // --- VEHICLE SYSTEM INTEGRATION ---
        let playerInputEnabled = true;

        const tpsVehicleSystem = new TPSVehicleSystem(scene, camera, playerGroup, (enabled) => {
            playerInputEnabled = enabled;
            // Also reset keys if disabled to prevent stuck inputs
            if (!enabled) {
                Object.keys(keys).forEach(k => keys[k] = false);
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            // Update Vehicle System
            // Use fixed delta for physics if possible, but for now match game loop
            const dt = 1 / 60;
            tpsVehicleSystem.update(dt);

            const wallClockNow = Date.now();
            const wallClockDelta = wallClockNow - lastFrameTime;
            lastFrameTime = wallClockNow;

            // Slow Motion
            if (slowMoTimer > 0) {
                slowMoTimer -= wallClockDelta;
                currentTimeScale = swordSettings.slowMoFactor;
            } else {
                currentTimeScale = 1.0;
            }

            const gameDelta = wallClockDelta * currentTimeScale;
            gameTime += gameDelta;
            const now = gameTime;

            // Her frame başında hit sayacını sıfırla
            frameHitCount = 0;

            // 0. Karakterin Dünyadaki Gerçek Pozisyonunu Hesapla
            // (FinalCharacterBody varsa onu baz alıyoruz, in-place olmayan animasyonlarda kaymayı yakalamak için)
            if (playerBody) {
                playerBody.getWorldPosition(playerBodyWorldPos);
            } else {
                playerBodyWorldPos.copy(playerGroup.position);
            }

            // 0. Odak ve Takip Noktaları
            const vehicleTarget = tpsVehicleSystem ? tpsVehicleSystem.getCameraTarget() : null;
            let lookAtPos = vehicleTarget || playerBodyWorldPos; // Kameranın baktığı ana hedef
            let railFollowPos = lookAtPos.clone();             // Ray'in takip ettiği nokta

            // Pivot sistemi sadece rayın pozisyonunu etkiler, bakış hedefini bozmaz
            // ANCAK: Araç modundaysak pivot sistemini bypass et, çünkü pivot karakterin içinde olabilir
            if (!vehicleTarget && activeCameraPivot && pivotParent) {
                const pivot = pivotParent.getObjectByName(activeCameraPivot);
                if (pivot) {
                    railFollowPos = new THREE.Vector3();
                    pivot.getWorldPosition(railFollowPos);
                }
            }

            // 1. Hacim (Volume) Kontrolü ve Trigger Sistemi
            // Diğer her şeyden önce bu kontrolü yapalım ki hem hareketi hem animasyonu etkileyebilsin.
            const activeVolumes = pathManager ? pathManager.getVolumesAt(playerBodyWorldPos) : [];
            const activeVolume = activeVolumes.length > 0 ? activeVolumes[0] : null;

            if (!window.prevVolumes) window.prevVolumes = [];

            // --- VOLUME ENTER/EXIT HOOKS ---
            // Enter Logic
            for (let vol of activeVolumes) {
                if (!window.prevVolumes.includes(vol)) {
                    OnEnterVolume(vol.name);
                    // Otomatik rota geçişi (Blender'da volume'a pathName custom property verilmişse)
                    if (vol.pathName) {
                        pathManager.setActivePath(vol.pathName);
                    }
                }
            }

            // Exit Logic (and Existing Reset Logic)
            for (let prevVol of window.prevVolumes) {
                if (!activeVolumes.includes(prevVol)) {
                    OnExitVolume(prevVol.name);

                    // Rotadan çıkış kontrolü
                    if (prevVol.pathName && pathManager.activePathName === prevVol.pathName) {
                        pathManager.setActivePath(null);
                    }

                    if (prevVol.animationPointLoop) {
                        prevVol.hasTriggered = false;
                    }
                }
            }
            window.prevVolumes = activeVolumes;

            // --- ANIMATION TRIGGER LOGIC (ALL VOLUMES) ---
            // Global animationRegistry'den arama yapar - Player, Environment veya Camera fark etmez
            for (let vol of activeVolumes) {
                if (vol.animationPoint && !vol.hasTriggered) {
                    TriggerAnimation(vol.animationPoint, {
                        loop: vol.animationPointLoop,
                        haveOriginShift: vol.animationPointHaveOriginShift,
                        useWorldOrigin: vol.animationPointUseWorldOrigin
                    });
                    vol.hasTriggered = true;
                }
            }

            // Shake
            let shakeX = 0, shakeY = 0;
            if (currentShakeTime > 0) {
                currentShakeTime -= wallClockDelta;
                const shakePower = swordSettings.shakeIntensity * shakeMultiplier * (currentShakeTime / swordSettings.shakeDuration);
                shakeX = (Math.random() - 0.5) * 2 * shakePower;
                shakeY = (Math.random() - 0.5) * 2 * shakePower;
            }

            // 1. Oyuncu Hareketi (Shockwave kilidi kontrolü)
            let moveX = 0;
            let moveZ = 0;
            const isShockwaveLocked = (now < shockwaveLockUntil);

            // CLIMBING UPDATE
            climbSystem.update(wallClockDelta);

            // GRAVITY (Yerçekimi) MANTIĞI
            if (!climbSystem.isClimbing && !climbSystem.isVaulting) {
                const gravity = 0.015;
                playerVerticalVelocity -= gravity * currentTimeScale;
                const nextY = playerGroup.position.y + playerVerticalVelocity * currentTimeScale;

                const groundY = getGroundY(playerGroup.position.x, playerGroup.position.z, playerGroup.position.y);

                if (nextY <= groundY) {
                    playerGroup.position.y = groundY;
                    playerVerticalVelocity = 0;
                } else {
                    playerGroup.position.y = nextY;
                }
            } else {
                playerVerticalVelocity = 0; // Asılıyken düşme
            }

            // Kamera-bağımlı hareket vektörlerini hesapla
            const camForward = new THREE.Vector3();
            camera.getWorldDirection(camForward);
            camForward.y = 0;
            camForward.normalize();

            const camRight = new THREE.Vector3().crossVectors(camera.up, camForward).normalize();

            if (!isShockwaveLocked && !climbSystem.isClimbing && !climbSystem.isVaulting && playerInputEnabled) {
                let inputX = 0;
                let inputZ = 0;
                if (keys.w || keys.up) inputZ += 1;
                if (keys.s || keys.down) inputZ -= 1;
                if (keys.a || keys.left) inputX += 1;
                if (keys.d || keys.right) inputX -= 1;

                if (inputX !== 0 || inputZ !== 0) {
                    const moveVector = new THREE.Vector3();
                    moveVector.addScaledVector(camForward, inputZ);
                    moveVector.addScaledVector(camRight, inputX);
                    // Normalize etme, scaledSpeed ile çarpılacak zaten ama yönü belirlemiş olduk
                    moveX = moveVector.x;
                    moveZ = moveVector.z;
                }
            }

            // Sürükleme durumunda hareket kısıtlamaları
            // Sürükleme modunda kamera-bağımlı hareketi kullanmak için özel override mantığı kaldırıldı.
            // moveX ve moveZ zaten yukarıda kamera açısına göre hesaplanıyor.
            // dragSystem.isDragging kontrolü sadece rotasyonu kilitlemek için kullanılacak.

            if (moveX !== 0 || moveZ !== 0 || jumpVelocity.lengthSq() > 0.001) {
                const scaledSpeed = swordSettings.moveSpeed * currentTimeScale;

                // Input Hareketi + Jump Momentum
                let deltaX = (moveX * scaledSpeed) + (jumpVelocity.x * currentTimeScale);
                let deltaZ = (moveZ * scaledSpeed) + (jumpVelocity.z * currentTimeScale);

                // Sürtünme Uygula
                const groundY = getGroundY(playerGroup.position.x, playerGroup.position.z, playerGroup.position.y);
                const isGrounded = (playerGroup.position.y <= groundY + 0.1);

                if (isGrounded) {
                    jumpVelocity.multiplyScalar(swordSettings.groundFriction);
                } else {
                    jumpVelocity.multiplyScalar(swordSettings.airFriction);
                }

                // Hedef pozisyonlar
                const targetX = playerGroup.position.x + deltaX;
                const targetZ = playerGroup.position.z + deltaZ;
                let finalX = targetX;
                let finalZ = targetZ;

                // -- DİNAMİK ÇARPIŞMA KONTROLÜ (Raycast) --
                if (collisionMeshes.length > 0) {
                    const margin = 0.4;
                    const wallRaycaster = new THREE.Raycaster();

                    // Sürüklenen objeyi çarpışma kontrolünden muaf tut (karakterin içindeymiş gibi davranmasın)
                    const filteredMeshes = collisionMeshes.filter(m => m !== dragSystem.dragObject);

                    // X Yönü Kontrolü
                    if (moveX !== 0 || jumpVelocity.x !== 0) {
                        const xDir = new THREE.Vector3(deltaX, 0, 0).normalize();
                        const xOrigin = new THREE.Vector3(playerGroup.position.x, playerGroup.position.y + 0.8, playerGroup.position.z);
                        wallRaycaster.set(xOrigin, xDir);
                        wallRaycaster.far = margin;

                        let hit = wallRaycaster.intersectObjects(filteredMeshes).length > 0;

                        // Sürükleme varsa kutunun da çarpışmasını kontrol et
                        if (dragSystem.isDragging && !hit) {
                            const boxOrigin = new THREE.Vector3(dragSystem.dragObject.position.x, dragSystem.dragObject.position.y, dragSystem.dragObject.position.z);
                            wallRaycaster.set(boxOrigin, xDir);
                            wallRaycaster.far = 1.0; // Kutunun kendi boyutu kadar margin
                            hit = wallRaycaster.intersectObjects(filteredMeshes).length > 0;
                        }

                        if (hit) {
                            finalX = playerGroup.position.x;
                            jumpVelocity.x = 0;
                        }
                    }

                    // Z Yönü Kontrolü
                    if (moveZ !== 0 || jumpVelocity.z !== 0) {
                        const zDir = new THREE.Vector3(0, 0, deltaZ).normalize();
                        const zOrigin = new THREE.Vector3(playerGroup.position.x, playerGroup.position.y + 0.8, playerGroup.position.z);
                        wallRaycaster.set(zOrigin, zDir);
                        wallRaycaster.far = margin;

                        let hit = wallRaycaster.intersectObjects(filteredMeshes).length > 0;

                        // Sürükleme varsa kutunun da çarpışmasını kontrol et
                        if (dragSystem.isDragging && !hit) {
                            const boxOrigin = new THREE.Vector3(dragSystem.dragObject.position.x, dragSystem.dragObject.position.y, dragSystem.dragObject.position.z);
                            wallRaycaster.set(boxOrigin, zDir);
                            wallRaycaster.far = 1.0;
                            hit = wallRaycaster.intersectObjects(filteredMeshes).length > 0;
                        }

                        if (hit) {
                            finalZ = playerGroup.position.z;
                            jumpVelocity.z = 0;
                        }
                    }
                }

                playerGroup.position.x = finalX;
                playerGroup.position.z = finalZ;

                // DragSystem Update (Karakter hareketinden hemen sonra objeyi yanına çek)
                dragSystem.update();

                // Rotasyon (Sadece INPUT varsa dön, zıplama momentumunda dönme, sürükleme yapmıyorsak)
                if ((moveX !== 0 || moveZ !== 0) && !dragSystem.isDragging) {
                    // Hareket vektörüne göre dön (input yönüne göre, çarpışma olsa bile karakter input yönüne bakmalı)
                    const targetRotation = Math.atan2(moveX, moveZ);
                    let rotationDiff = targetRotation - playerGroup.rotation.y;
                    while (rotationDiff > Math.PI) rotationDiff -= Math.PI * 2;
                    while (rotationDiff < -Math.PI) rotationDiff += Math.PI * 2;
                    playerGroup.rotation.y += rotationDiff * swordSettings.turnSpeed;
                }
            }

            // --- AUTO LEDGE GRAB (Otomatik Tutunma) ---
            // Havada ve düşüyorsak (veya zıplamanın sonundaysak) otomatik tutunmayı dene
            const currentGroundY = getGroundY(playerGroup.position.x, playerGroup.position.z, playerGroup.position.y);
            const isGroundedNow = (playerGroup.position.y <= currentGroundY + 0.1);

            if (!isGroundedNow && !climbSystem.isClimbing && !climbSystem.isVaulting && playerVerticalVelocity <= 0) {
                climbSystem.tryClimb(true); // Otomatik mod
            }

            // --- BOSS FOLLOW LOGIC ---
            if (bossState.isFollowing && bossState.mesh) {
                const boss = bossState.mesh;
                const pPos = playerGroup.position;

                // Karakterimize doğru yönel (Yatay düzlemde)
                const dx = pPos.x - boss.position.x;
                const dz = pPos.z - boss.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);

                if (dist > 1.5) { // Çok yaklaşınca dur (opsiyonel)
                    const angle = Math.atan2(dx, dz);
                    const speed = bossState.speed * currentTimeScale;

                    boss.position.x += Math.sin(angle) * speed;
                    boss.position.z += Math.cos(angle) * speed;

                    // Yumuşak dönüş (Boss modelinde Z ekseni "yukarı" kabul edildiği için ve yön ters olduğu için)
                    let targetRotation = -angle;
                    let rotationDiff = targetRotation - boss.rotation.z;
                    while (rotationDiff > Math.PI) rotationDiff -= Math.PI * 2;
                    while (rotationDiff < -Math.PI) rotationDiff += Math.PI * 2;
                    boss.rotation.z += rotationDiff * 0.1;
                }

                // Zemine oturt
                const bossGroundY = getGroundY(boss.position.x, boss.position.z, boss.position.y);
                boss.position.y = bossGroundY;
            }

            // (Sprite update moved after mixer update to prevent lag during origin shifts)

            // --- ANIMASYON YÖNETİMİ ---
            const minFramesMs = 160;

            // KİLİT AKTİFKEN SPACE INPUT'UNU YOK SAY
            if (!isShockwaveLocked && keys.space) {
                lastAttackPressTime = now;
            }

            // Kilit aktifken saldırı state'ini zorla false yap
            const isAttackingState = !isShockwaveLocked && (keys.space || (now - lastAttackPressTime < minFramesMs));
            const isMovingState = (moveX !== 0 || moveZ !== 0);

            // Hedef animasyonu belirle
            let targetAction = null;

            const currentGroundY_anim = getGroundY(playerGroup.position.x, playerGroup.position.z, playerGroup.position.y);
            const isGroundedNow_anim = (playerGroup.position.y <= currentGroundY_anim + 0.1);

            if (attackAction && isAttackingState) {
                targetAction = attackAction;
                targetAction.timeScale = swordSettings.attackAnimSpeed;
                activeTriggerAction = null; // Manuel saldırı trigger'ı bozar

                // ColliderAttack animasyonunu da senkronize başlat
                if (colliderAttackAction && !colliderAttackAction.isRunning()) {
                    colliderAttackAction.reset();
                    colliderAttackAction.timeScale = swordSettings.attackAnimSpeed;
                    colliderAttackAction.play();
                }
            } else if (activeTriggerAction) {
                // Volume tarafından tetiklenen özel bir animasyon varsa ona geç (EN ÖNCELİKLİ)
                targetAction = activeTriggerAction;
                // Eğer animasyon bittiyse (LoopOnce ise ve bittiyse) targetAction sıfırlanacak
                if (targetAction.loop === THREE.LoopOnce && targetAction.paused && targetAction.time > 0) {
                    activeTriggerAction = null;
                    targetAction = idleAction;
                }
            } else if (climbSystem.isClimbing || climbSystem.isVaulting) {
                // Tırmanma/Vault durumunda Idle oynat
                if (idleAction) {
                    targetAction = idleAction;
                    targetAction.timeScale = 1.0;
                }
            } else if (dragSystem.isDragging) {
                // Sürükleme durumunda Walk iptal, Idle (veya ileride Push pozisyonu)
                if (idleAction) {
                    targetAction = idleAction;
                    targetAction.timeScale = 1.0;
                }
            } else if (!isGroundedNow_anim && jumpAction) {
                // Havadaysak Jump animasyonu
                targetAction = jumpAction;
            } else if (walkAction && isMovingState) {
                targetAction = walkAction;
                targetAction.timeScale = swordSettings.animSpeed;

                // Saldırı bitti, ColliderAttack'ı durdur
                if (colliderAttackAction && colliderAttackAction.isRunning()) {
                    colliderAttackAction.stop();
                }

                // Space bırakıldı - whoosh seslerini ve saldırı state'ini durdur
                if (isAttacking) {
                    isAttacking = false;
                    stopAllWhooshSounds();
                    whooshTriggeredFlags = [];
                }
            } else {
                // Idle durumu - Idle animasyonunu oynat
                if (idleAction) {
                    targetAction = idleAction;
                    targetAction.timeScale = 1;
                }

                // Idle durumunda da ColliderAttack'ı durdur
                if (colliderAttackAction && colliderAttackAction.isRunning()) {
                    colliderAttackAction.stop();
                }

                // Idle'da da whoosh'u durdur
                if (isAttacking) {
                    isAttacking = false;
                    stopAllWhooshSounds();
                    whooshTriggeredFlags = [];
                }
            }

            // Geçiş Yap (Trigger animasyonları için daha hızlı/direkt geçiş)
            // World origin animasyonlarında yumuşatma (fade) yapılamaz, saniyeler içinde zıplamaya neden olur
            let fadeTime = (targetAction === activeTriggerAction) ? 0.05 : 0.2;
            if (targetAction && targetAction._useWorldOrigin) fadeTime = 0;

            fadeToAction(targetAction, fadeTime);

            // --- Retro Animation FPS Logic ---
            if (mixer) {
                const animDelta = gameDelta / 1000;
                animAccumulator += animDelta;

                // Aktif aksiyona göre hedef FPS seç
                let targetFps = swordSettings.retroFps;
                if (currentAction === attackAction && attackAction && attackAction.isRunning()) {
                    targetFps = swordSettings.attackFps;
                }

                const frameInterval = 1 / targetFps;

                if (animAccumulator >= frameInterval) {
                    // Biriken süreyi kullan fakat tam katları kadar update et
                    // mixer.update(frameInterval); // Sabit adım
                    mixer.update(animAccumulator); // Hepsini birden uygula

                    // ColliderMixer'ı da aynı anda güncelle (senkronizasyon için)
                    if (colliderMixer) {
                        colliderMixer.update(animAccumulator);
                    }

                    // Environment animasyonlarını güncelle
                    if (envMixer) {
                        envMixer.update(animAccumulator);
                    }

                    // Cutscene kamera animasyonlarını güncelle
                    if (cutsceneMixer) {
                        cutsceneMixer.update(animAccumulator);
                    }

                    // Boss animasyonlarını güncelle
                    if (bossMixer) {
                        bossMixer.update(animAccumulator);
                    }

                    animAccumulator = 0;
                }


                // --- Discrete Sprite Update (Moved outside for smooth 60fps movement) ---
                if (playerModel && playerSprite) {
                    // Pozisyon senkronizasyonu
                    playerSprite.setPosition(playerGroup.position.x, playerGroup.position.y, playerGroup.position.z);

                    // ÖZEL DURUM: Eğer hacim tarafından tetiklenen bir animasyon oynuyorsa,
                    // rotasyonu animasyonun kendisine bırakıyoruz.
                    const isTriggerPlaying = activeTriggerAction && activeTriggerAction.isRunning();
                    if (!isTriggerPlaying) {
                        playerModel.rotation.y = playerGroup.rotation.y;
                    }

                    // Sprite update (Yine her frame çağırıyoruz ki kamera billboard sync düzgün olsun)
                    playerSprite.update();
                }
            }

            // 2. Saldırı Başlatma (Kombo Logic)
            if (playerInputEnabled && keys.space && !isAttacking) {
                isAttacking = true;

                // Attack animation handled by loop above

                attackStartTime = now;
                currentShakeTime = swordSettings.shakeDuration;
                hasLastPos = false;
                hasTriggeredSlowMo = false;
                // Her keyframe için triggered flag'ini sıfırla
                whooshTriggeredFlags = swordSettings.whooshKeyframes.map(() => false);
                // Shockwave flag'ini sıfırla (yeni saldırıda tekrar tetiklenebilsin)
                shockwaveTriggered = false;

                // KOMBO HESAPLAMA (Gerçek Zaman Kullanılır)
                const timeSinceLastAttack = wallClockNow - lastAttackEndTime;

                if (timeSinceLastAttack < swordSettings.comboResetTime) {
                    comboStep = (comboStep + 1) % 3; // 0 -> 1 -> 2 -> 0
                } else {
                    comboStep = 0; // Çok bekledi, resetle
                }

                // Açıları Belirle
                if (comboStep === 0) { // Vuruş 1
                    activeStartY = swordSettings.c1_StartY; activeEndY = swordSettings.c1_EndY;
                    activeStartX = swordSettings.c1_StartX; activeEndX = swordSettings.c1_EndX;
                } else if (comboStep === 1) { // Vuruş 2
                    activeStartY = swordSettings.c2_StartY; activeEndY = swordSettings.c2_EndY;
                    activeStartX = swordSettings.c2_StartX; activeEndX = swordSettings.c2_EndX;
                } else { // Vuruş 3
                    activeStartY = swordSettings.c3_StartY; activeEndY = swordSettings.c3_EndY;
                    activeStartX = swordSettings.c3_StartX; activeEndX = swordSettings.c3_EndX;
                }
            }

            // --- SALDIRI MANTIĞI ---
            if (isAttacking) {
                const elapsed = now - attackStartTime;

                // Animasyonun GERÇEK süresini kullan (timeScale dahil)
                let realAnimDuration = swordSettings.attackDuration; // Fallback
                if (attackAction && attackAction.getClip()) {
                    // Gerçek animasyon süresi / timeScale = efektif süre (ms cinsinden)
                    const clipDuration = attackAction.getClip().duration; // saniye
                    const timeScale = swordSettings.attackAnimSpeed || 1;
                    realAnimDuration = (clipDuration / timeScale) * 1000; // ms
                }

                const progress = Math.min(elapsed / realAnimDuration, 1);

                // Vuruş bitti mi?
                if (progress >= 1) {
                    isAttacking = false;
                    lastAttackEndTime = wallClockNow;
                    whooshTriggeredFlags = [];
                    stopAllWhooshSounds(); // Aktif sesleri durdur
                } else {
                    // Saldırı başı (ilk frame) - Shake Tetikle
                    if (elapsed < 20 && currentShakeTime <= 0) {
                        shakeMultiplier = 1.0;
                        currentShakeTime = swordSettings.shakeDuration;
                    }

                    // WHOOSH SESLERİ: Her keyframe için kontrol et (animasyon % ilerlemesine göre)
                    const progressPercent = progress * 100;
                    swordSettings.whooshKeyframes.forEach((kf, index) => {
                        if (!whooshTriggeredFlags[index] && progressPercent >= kf.startPercent) {
                            playWhooshSound(kf, realAnimDuration);
                            whooshTriggeredFlags[index] = true;
                        }
                    });

                    // SHOCKWAVE TETİKLEME: Belirtilen frame'e ulaşınca
                    if (swordSettings.shockwaveEnabled && !shockwaveTriggered) {
                        const currentFrame = (swordSettings.shockwaveFrame / swordSettings.shockwaveTotalFrames) * 100;
                        if (progressPercent >= currentFrame) {
                            shockwaveTriggered = true;
                            shockwaveActive = true;
                            shockwaveStartTime = now;
                            shockwavePosition.copy(playerGroup.position);
                            shockwaveMesh.position.x = shockwavePosition.x;
                            shockwaveMesh.position.z = shockwavePosition.z;
                            shockwaveMesh.visible = true;

                            // KARAKTERİ KİLİTLE - shockwave süresince input yok
                            shockwaveLockUntil = now + swordSettings.shockwaveLockDuration;

                            // Büyük etki için shake tetikle
                            shakeMultiplier = 2.0;
                            currentShakeTime = swordSettings.shakeDuration * 2;

                            // Shockwave sesi (düşük frekanslı boom)
                            playShockwaveSound();
                        }
                    }
                }

                // Animasyon Easing
                const ease = 1 - Math.pow(1 - progress, 3);

                // Dinamik Açıları Kullan
                const startAngleY = THREE.MathUtils.degToRad(activeStartY);
                const endAngleY = THREE.MathUtils.degToRad(activeEndY);
                swordContainer.rotation.y = startAngleY + (endAngleY - startAngleY) * ease;

                const startAngleX = THREE.MathUtils.degToRad(activeStartX);
                const endAngleX = THREE.MathUtils.degToRad(activeEndX);
                swordContainer.rotation.x = startAngleX + (endAngleX - startAngleX) * ease;

                // Hitbox
                const currentTip = new THREE.Vector3();
                const currentBase = new THREE.Vector3();
                tipPoint.getWorldPosition(currentTip);
                basePoint.getWorldPosition(currentBase);
                const swordLine = new THREE.Line3(currentBase, currentTip);
                const closestPointOnBlade = new THREE.Vector3();

                for (let i = 0; i < enemies.length; i++) {
                    const enemy = enemies[i];
                    if (enemy.userData.isDead) continue;
                    if (now - enemy.userData.lastHitTime < 500) continue;

                    swordLine.closestPointToPoint(enemy.position, true, closestPointOnBlade);
                    const distToBlade = enemy.position.distanceTo(closestPointOnBlade);
                    // Hit Threshold: Temel yarıçap + (scale * customDamageScale)
                    const hitThreshold = (0.55 + (0.1 * swordSettings.swordScale)) * swordSettings.swordDamageHitboxScale;

                    if (distToBlade < hitThreshold) {
                        // Hit logic
                        enemy.userData.lastHitTime = now;
                        enemy.userData.currentHp--;

                        // Efektler
                        playSound('hit');

                        // Çoklu vuruşta shake birikimini sınırla
                        frameHitCount++;
                        if (frameHitCount === 1) {
                            // İlk vuruşta shake başlat
                            shakeMultiplier = 1.5;
                            currentShakeTime = swordSettings.shakeDuration;
                        } else {
                            // Ek vuruşlarda sadece multiplier'ı biraz artır (max limite kadar)
                            shakeMultiplier = Math.min(shakeMultiplier + 0.2, maxShakeMultiplier);
                        }

                        // Slow Mo yok (istek üzerine kaldırıldı)
                        // if (!hasTriggeredSlowMo) {
                        //     slowMoTimer = swordSettings.slowMoDuration;
                        //     hasTriggeredSlowMo = true;
                        // }

                        const knockbackDir = new THREE.Vector3().subVectors(enemy.position, playerGroup.position).normalize();
                        enemy.userData.velocity.copy(knockbackDir).multiplyScalar(swordSettings.knockbackForce);
                        enemy.userData.velocity.y = swordSettings.knockbackLift;
                        enemy.material.color.setHex(0xffffff);
                        setTimeout(() => { if (!enemy.userData.isDead) enemy.material.color.setHex(0xff2222); }, 100);
                        if (enemy.userData.currentHp <= 0) enemy.userData.isDead = true;
                        if (currentShakeTime < 100) currentShakeTime = 100;
                    }
                }

                // Trail - RightHand bone'u takibi
                const punchCenter = new THREE.Vector3();
                if (rightHandBone) {
                    rightHandBone.getWorldPosition(punchCenter);
                } else {
                    tipPoint.getWorldPosition(punchCenter); // Fallback
                }

                // Local koordinatlara çevir (trail render için)
                playerGroup.worldToLocal(punchCenter);

                if (hasLastPos) {
                    const steps = 3;
                    for (let i = 1; i <= steps; i++) {
                        const t = i / steps;
                        const lerpPos = new THREE.Vector3().copy(lastTipPos).lerp(punchCenter, t);
                        trailPositions.unshift({ center: lerpPos, time: now });
                    }
                } else {
                    trailPositions.unshift({ center: punchCenter.clone(), time: now });
                }
                lastTipPos.copy(punchCenter);
                hasLastPos = true;
            } else {
                const returnSpeed = 0.1 * currentTimeScale;

                // Kılıcı nötr pozisyona yumuşakça döndür
                swordContainer.rotation.y += (0 - swordContainer.rotation.y) * returnSpeed;
                swordContainer.rotation.x += (0 - swordContainer.rotation.x) * returnSpeed;

                hasLastPos = false;

                // Saldırı bitti - aktif whoosh seslerini durdur
                if (activeWhooshNodes.length > 0) {
                    stopAllWhooshSounds();
                }

                // Saldırı bitti - trail'i anında temizle
                trailPositions.length = 0;
            }

            // Trail Logic
            while (trailPositions.length > 0) {
                const oldestPoint = trailPositions[trailPositions.length - 1];
                if (now - oldestPoint.time > swordSettings.trailLife) {
                    trailPositions.pop();
                } else {
                    break;
                }
            }
            if (trailPositions.length > MAX_TRAIL_POINTS) trailPositions.length = MAX_TRAIL_POINTS;

            // Trail Render - Oval halka efekti
            if (trailPositions.length < 2) {
                trailMesh.visible = false;
            } else {
                trailMesh.visible = true;
                const positions = trailGeometry.attributes.position.array;
                const colors = trailGeometry.attributes.color.array;
                colorBaseObj.set(swordSettings.trailColorBase);

                for (let i = 0; i < trailPositions.length; i++) {
                    const point = trailPositions[i];
                    const age = now - point.time;
                    const lifeRatio = 1 - (age / swordSettings.trailLife);
                    const alpha = Math.max(0, lifeRatio);

                    // Radius küçülen efekt (eski noktalar daha küçük)
                    const currentRadius = OVAL_RADIUS * lifeRatio;

                    // Halka segmentlerini çiz (X-Z düzleminde, yere paralel 3D görünüm)
                    for (let seg = 0; seg < RING_SEGMENTS; seg++) {
                        const angle = (seg / RING_SEGMENTS) * Math.PI * 2;
                        const offsetX = Math.cos(angle) * currentRadius;
                        const offsetZ = Math.sin(angle) * currentRadius;

                        const vertexIdx = (i * RING_SEGMENTS + seg) * 3;
                        positions[vertexIdx] = point.center.x + offsetX;
                        positions[vertexIdx + 1] = point.center.y; // Y sabit (yükseklik)
                        positions[vertexIdx + 2] = point.center.z + offsetZ;

                        colors[vertexIdx] = colorBaseObj.r * alpha;
                        colors[vertexIdx + 1] = colorBaseObj.g * alpha;
                        colors[vertexIdx + 2] = colorBaseObj.b * alpha;
                    }
                }
                trailGeometry.attributes.position.needsUpdate = true;
                trailGeometry.attributes.color.needsUpdate = true;

                // Draw range: üçgen sayısı = (ring sayısı - 1) * segment sayısı * 2 üçgen * 3 vertex
                const triangleCount = Math.max(0, trailPositions.length - 1) * RING_SEGMENTS * 2;
                trailGeometry.setDrawRange(0, triangleCount * 3);
            }

            // --- SHOCKWAVE UPDATE ---
            if (shockwaveActive) {
                const shockwaveElapsed = now - shockwaveStartTime;
                const shockwaveProgress = Math.min(shockwaveElapsed / swordSettings.shockwaveDuration, 1);

                if (shockwaveProgress >= 1) {
                    // Shockwave bitti
                    shockwaveActive = false;
                    shockwaveMesh.visible = false;

                    // BİTİŞ SHAKE'İ - son darbe hissi
                    shakeMultiplier = 1.5;
                    currentShakeTime = swordSettings.shakeDuration * 1.5;
                } else {
                    // Genişleyen halka - dinamik geometry güncellemesi
                    const currentRadius = shockwaveProgress * swordSettings.shockwaveMaxRadius;
                    const ringWidth = 0.5 + (1 - shockwaveProgress) * 1.5; // Başta kalın, sona doğru incelen
                    const innerRadius = Math.max(0.01, currentRadius - ringWidth);
                    const outerRadius = currentRadius;

                    // Geometry'yi güncelle (yeniden oluştur)
                    shockwaveMesh.geometry.dispose();
                    shockwaveMesh.geometry = new THREE.RingGeometry(innerRadius, outerRadius, 64);

                    // Fade out opacity
                    const fadeProgress = 1 - shockwaveProgress;
                    shockwaveMaterial.opacity = fadeProgress * 0.8;

                    // Renk güncellemesi (panelden)
                    shockwaveMaterial.color.set(swordSettings.shockwaveColor);

                    // DÜŞMAN HASAR VE KNOCKBACK
                    // Sadece dalganın genişleyen kenarına yakın düşmanlara hasar ver
                    for (let i = 0; i < enemies.length; i++) {
                        const enemy = enemies[i];
                        if (enemy.userData.isDead) continue;
                        if (enemy.userData.isHeld) continue;
                        // Bu shockwave'den zaten hasar aldı mı?
                        if (enemy.userData.lastShockwaveHit === shockwaveStartTime) continue;

                        // Mesafe hesapla (2D, yatay düzlem)
                        const dx = enemy.position.x - shockwavePosition.x;
                        const dz = enemy.position.z - shockwavePosition.z;
                        const distToCenter = Math.sqrt(dx * dx + dz * dz);

                        // Dalganın kenarına yakınlık (halkadan geçtiğinde hasar al)
                        if (distToCenter >= innerRadius && distToCenter <= outerRadius + 1.0) {
                            // HASAR UYGULA
                            enemy.userData.lastShockwaveHit = shockwaveStartTime;
                            enemy.userData.currentHp -= swordSettings.shockwaveDamage;

                            // Mesafeye ters oranlı knockback (yakın = daha güçlü)
                            const distanceFactor = 1 - (distToCenter / swordSettings.shockwaveMaxRadius);
                            const knockbackPower = swordSettings.shockwaveKnockback * (0.5 + distanceFactor * 0.5);

                            // Yön: Merkezden dışarı
                            const knockDir = new THREE.Vector3(dx, 0, dz).normalize();
                            enemy.userData.velocity.copy(knockDir).multiplyScalar(knockbackPower);
                            enemy.userData.velocity.y = swordSettings.knockbackLift * distanceFactor;

                            // Görsel feedback
                            enemy.material.color.setHex(0xffff00); // Sarı flash
                            setTimeout(() => {
                                if (!enemy.userData.isDead) enemy.material.color.setHex(0xff2222);
                            }, 150);

                            // Ölü mü?
                            if (enemy.userData.currentHp <= 0) {
                                enemy.userData.isDead = true;
                            }

                            playSound('hit');
                        }
                    }
                }
            }


            // --- DÜŞMAN YÖNETİMİ ---
            // --- DÜŞMAN YÖNETİMİ ---
            /*
            if (now - lastSpawnTime > swordSettings.enemySpawnRate) {
                spawnEnemy();
                lastSpawnTime = now;
            }
            */

            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];

                // Eğer tutuluyorsa, fizik uygulama, sadece pozisyonu güncelle
                if (enemy.userData.isHeld) {
                    // Karakterin kafasının üzerinde
                    const holdPos = playerGroup.position.clone();
                    holdPos.y += 2.5;
                    // Lerp ile taşı
                    enemy.position.lerp(holdPos, 0.2);
                    enemy.rotation.x += 0.1; // Eğlence için döndür
                    enemy.rotation.z += 0.05;
                    continue; // Döngünün geri kalanını atla
                }

                if (enemy.userData.velocity.lengthSq() > 0.0001) {
                    const frameDisplacement = enemy.userData.velocity.clone().multiplyScalar(currentTimeScale);
                    enemy.position.add(frameDisplacement);
                    const adjustedDrag = Math.pow(swordSettings.knockbackDrag, currentTimeScale);
                    enemy.userData.velocity.multiplyScalar(adjustedDrag);
                    // Yerçekimi uygula (hep tam)
                    if (enemy.position.y > 0.5) enemy.userData.velocity.y -= 0.05 * currentTimeScale;
                    else if (enemy.position.y < 0.5) { enemy.position.y = 0.5; enemy.userData.velocity.y = 0; }

                    // Fırlatılan düşman çarpışma kontrolü
                    if (enemy.userData.isThrown && !enemy.userData.isDead) {
                        const throwSpeed = enemy.userData.velocity.length();
                        // Yeterince hızlıysa çarpışma kontrolü yap
                        if (throwSpeed > 0.1) {
                            for (let j = 0; j < enemies.length; j++) {
                                const otherEnemy = enemies[j];
                                if (otherEnemy === enemy) continue; // Kendisi değil
                                if (otherEnemy.userData.isDead) continue;
                                if (otherEnemy.userData.isHeld) continue; // Tutulan düşman değil

                                const dist = enemy.position.distanceTo(otherEnemy.position);
                                if (dist < swordSettings.throwDamageRadius) {
                                    // ÇARPIŞMA! Her iki düşmana da hasar ver
                                    playSound('hit');

                                    // Fırlatılan düşmana hasar
                                    enemy.userData.currentHp--;
                                    enemy.material.color.setHex(0xffffff);
                                    setTimeout(() => { if (!enemy.userData.isDead) enemy.material.color.setHex(0xff2222); }, 100);
                                    if (enemy.userData.currentHp <= 0) enemy.userData.isDead = true;

                                    // Çarpılan düşmana hasar
                                    otherEnemy.userData.currentHp--;
                                    otherEnemy.material.color.setHex(0xffffff);
                                    setTimeout(() => { if (!otherEnemy.userData.isDead) otherEnemy.material.color.setHex(0xff2222); }, 100);
                                    if (otherEnemy.userData.currentHp <= 0) otherEnemy.userData.isDead = true;

                                    // Her iki düşmanı da etrafa savur
                                    const impactDir = new THREE.Vector3().subVectors(otherEnemy.position, enemy.position).normalize();
                                    otherEnemy.userData.velocity.copy(impactDir).multiplyScalar(swordSettings.throwImpactForce);
                                    otherEnemy.userData.velocity.y = swordSettings.knockbackLift * 0.8;

                                    // Fırlatılan düşman ters yöne savrulsun
                                    enemy.userData.velocity.copy(impactDir).multiplyScalar(-swordSettings.throwImpactForce * 0.5);
                                    enemy.userData.velocity.y = swordSettings.knockbackLift * 0.5;

                                    // Shake efekti (birden fazla vuruşta biriksin)
                                    shakeMultiplier = Math.min(shakeMultiplier + 0.5, maxShakeMultiplier);
                                    currentShakeTime = swordSettings.shakeDuration;
                                }
                            }
                        } else {
                            // Hız çok düştü, artık fırlatma modunda değil
                            enemy.userData.isThrown = false;
                        }
                    }
                } else {
                    enemy.userData.velocity.set(0, 0, 0);
                    enemy.userData.isThrown = false; // Durduğunda fırlatma bitsin
                }

                if (enemy.userData.isDead) {
                    enemy.rotation.x += enemy.userData.rotationSpeed.x * currentTimeScale;
                    enemy.rotation.y += enemy.userData.rotationSpeed.y * currentTimeScale;
                    const shrinkFactor = Math.pow(0.95, currentTimeScale);
                    enemy.scale.multiplyScalar(shrinkFactor);
                    if (enemy.scale.x < 0.1) {
                        enemy.visible = false;
                        enemies.splice(i, 1);
                        enemyPool.push(enemy);
                    }
                } else {
                    if (enemy.userData.velocity.length() < 0.05) {
                        const direction = new THREE.Vector3().subVectors(playerGroup.position, enemy.position);
                        direction.y = 0; direction.normalize();
                        const scaledEnemySpeed = swordSettings.enemySpeed * currentTimeScale;
                        enemy.position.add(direction.multiplyScalar(scaledEnemySpeed));
                        const lookTarget = playerGroup.position.clone(); lookTarget.y = enemy.position.y; enemy.lookAt(lookTarget);
                        if (enemy.position.distanceTo(playerGroup.position) < 1.0) {
                            if (playerModel) {
                                playerModel.traverse((node) => {
                                    if (node.isMesh && node.material) {
                                        node.material.color.setHex(0xff0000);
                                        setTimeout(() => {
                                            if (node.userData.originalColor) node.material.color.copy(node.userData.originalColor);
                                            else node.material.color.setHex(0xffffff);
                                        }, 100);
                                    }
                                });
                            }
                            enemy.position.add(direction.multiplyScalar(-2.0));
                        }
                    }
                }
            }

            // --- KAMERA UPDATE ---
            if (swordSettings.enableOrbit) {
                if (!controls.enabled) controls.enabled = true;
                controls.target.copy(playerGroup.position);
                controls.target.x += shakeX;
                controls.target.y += shakeY;
                controls.update();
            } else {
                if (controls.enabled) controls.enabled = false;

                // ==========================================
                // JUMP GLITCH FIX: POST-ANIMATION UPDATE
                // mixer.update ve triggerAnimation çağrılarının ardından, karakter pozisyonutu
                // değişmiş olabilir. Kameranın gecikmeli zıplamasını önlemek için
                // matrisleri ve dünyadaki gerçek pozisyonu GÜNCELLEYELİM:
                if (playerGroup) playerGroup.updateMatrixWorld(true);
                if (playerBody) {
                    playerBody.getWorldPosition(playerBodyWorldPos);
                } else if (playerGroup) {
                    playerBodyWorldPos.copy(playerGroup.position);
                }

                lookAtPos = vehicleTarget || playerBodyWorldPos;
                railFollowPos = lookAtPos.clone();

                if (!vehicleTarget && activeCameraPivot && pivotParent) {
                    const pivot = pivotParent.getObjectByName(activeCameraPivot);
                    if (pivot) {
                        railFollowPos = new THREE.Vector3();
                        pivot.getWorldPosition(railFollowPos);
                    }
                }
                // ==========================================

                // --- DEBUG PATH SPHERE UPDATE ---
                let isOnPath = false;
                if (debugPathSphere) {
                    const sphereSpeed = swordSettings.debugCameraSnap ? 999.0 : 0.35;
                    const smoothedSpherePos = pathManager.getSmoothedClosestPoint(railFollowPos, debugPathSphere.position, sphereSpeed);
                    if (smoothedSpherePos) {
                        debugPathSphere.position.copy(smoothedSpherePos);
                        debugPathSphere.visible = false; // Mesh hidden, only used for camera tracking
                        isOnPath = true;
                    }
                }

                // Cinematic "Little Nightmares" Style Camera
                // 1. Hedef Pozisyon (Varsayılan: Offset'li takip)
                let targetCamX = lookAtPos.x + swordSettings.camOffsetX;
                let targetCamY = lookAtPos.y + swordSettings.camOffsetY;
                let targetCamZ = lookAtPos.z + swordSettings.camOffsetZ;

                // ROTA VARSA: Kamerayı sphere'e kilitle
                if (isOnPath) {
                    targetCamX = debugPathSphere.position.x;
                    targetCamY = debugPathSphere.position.y;
                    targetCamZ = debugPathSphere.position.z;
                }

                // İlk frame'de direkt ışınlan ki kayma olmasın
                if (!isCamInit) {
                    smoothedCamPos.set(targetCamX, targetCamY, targetCamZ);
                    smoothedFocusPos.copy(lookAtPos);
                    isCamInit = true;
                }

                // JUMP GLITCH FIX: Kamerayı hedefe anında kilitler (lerp sönümlemesini atlar)
                if (window.forceCameraSnap) {
                    smoothedCamPos.set(targetCamX, targetCamY, targetCamZ);
                }

                // 2. Smooth Takip (Lerp)
                const currentCamLerp = swordSettings.debugCameraSnap ? swordSettings.camLerp : swordSettings.camLerp;
                smoothedCamPos.x += (targetCamX - smoothedCamPos.x) * currentCamLerp;
                smoothedCamPos.y += (targetCamY - smoothedCamPos.y) * currentCamLerp;
                smoothedCamPos.z += (targetCamZ - smoothedCamPos.z) * currentCamLerp;


                // 3. Smooth Bakış (LookAt)
                const volumeTarget = activeVolume ? activeVolume.target : null;
                const targetWeight = volumeTarget ? 1.0 : 0.0;

                const currentBlendSpeed = swordSettings.debugCameraSnap ? 1.0 : swordSettings.volumeBlendSpeed;
                currentVolumeWeight += (targetWeight - currentVolumeWeight) * currentBlendSpeed;

                if (!window.lastVolumeTarget) window.lastVolumeTarget = new THREE.Vector3();
                if (activeVolume) {
                    window.lastVolumeTarget.copy(volumeTarget);
                }

                let targetFocusX = lookAtPos.x;
                let targetFocusY = lookAtPos.y;
                let targetFocusZ = lookAtPos.z;


                // Weight etkili mi? (Küçük epsilon sıfır kabul edilebilir)
                if (currentVolumeWeight > 0.001) {
                    // Determine current influence cap
                    let currentTargetInf;
                    if (activeVolume) {
                        if (activeVolume.influence !== undefined) {
                            currentTargetInf = activeVolume.influence;
                        } else {
                            currentTargetInf = swordSettings.volumeInfluence;
                        }
                        // Cache for exit transition
                        window.cachedExitInfluence = currentTargetInf;
                    } else {
                        // Exiting... use cached or default
                        currentTargetInf = window.cachedExitInfluence !== undefined ? window.cachedExitInfluence : swordSettings.volumeInfluence;
                    }

                    const inf = currentTargetInf * currentVolumeWeight;

                    // Son bilinen target'ı kullan (çıkışta da smooth olsun diye)
                    targetFocusX = THREE.MathUtils.lerp(lookAtPos.x, window.lastVolumeTarget.x, inf);
                    targetFocusY = THREE.MathUtils.lerp(lookAtPos.y, window.lastVolumeTarget.y, inf);
                    targetFocusZ = THREE.MathUtils.lerp(lookAtPos.z, window.lastVolumeTarget.z, inf);
                }

                // JUMP GLITCH FIX: Odak noktasını (LookAt) hedefe anında kilitler
                if (window.forceCameraSnap) {
                    smoothedFocusPos.x = targetFocusX;
                    smoothedFocusPos.y = targetFocusY;
                    smoothedFocusPos.z = targetFocusZ;
                    window.forceCameraSnap = false; // Temizle
                }

                const currentLookLerp = swordSettings.debugCameraSnap ? swordSettings.camLookLerp : swordSettings.camLookLerp;
                smoothedFocusPos.x += (targetFocusX - smoothedFocusPos.x) * currentLookLerp;
                smoothedFocusPos.y += (targetFocusY - smoothedFocusPos.y) * currentLookLerp;
                smoothedFocusPos.z += (targetFocusZ - smoothedFocusPos.z) * currentLookLerp;

                // === CUTSCENE CAMERA BLEND ===
                // Cutscene aktifken blend değerini 1'e doğru artır, returning modunda 0'a düşür
                if (cutsceneActive && !cutsceneReturning) {
                    cutsceneBlend += (1.0 - cutsceneBlend) * cutsceneBlendSpeed;
                } else if (cutsceneReturning) {
                    cutsceneBlend += (0.0 - cutsceneBlend) * cutsceneBlendSpeed;
                    // Blend neredeyse 0 olduğunda cutscene modunu tamamen kapat
                    if (cutsceneBlend < 0.01) {
                        cutsceneBlend = 0;
                        cutsceneActive = false;
                        cutsceneReturning = false;
                        console.log("Cutscene transition complete - back to gameplay camera");
                    }
                }

                // 4. Uygula + Shake (Önce temel pozisyon ve LookAt, sonra shake)
                // Eğer cutscene aktifse, gameplay ve cutscene kameraları arasında blend yap
                if (cutsceneBlend > 0.001 && cutsceneCamera) {
                    // Cutscene kamerasının dünya pozisyon ve rotasyonunu al
                    cutsceneCamera.updateMatrixWorld(true);
                    const cutscenePos = new THREE.Vector3();
                    const cutsceneQuat = new THREE.Quaternion();
                    cutsceneCamera.getWorldPosition(cutscenePos);
                    cutsceneCamera.getWorldQuaternion(cutsceneQuat);

                    // Gameplay kamera pozisyonu
                    const gameplayPos = new THREE.Vector3(smoothedCamPos.x, smoothedCamPos.y, smoothedCamPos.z);

                    // Gameplay kamera rotasyonunu hesapla (lookAt'ten)
                    // Geçici matris ile hesapla (clone() yerine daha güvenli)
                    const lookAtMatrix = new THREE.Matrix4();
                    lookAtMatrix.lookAt(gameplayPos, smoothedFocusPos, new THREE.Vector3(0, 1, 0));
                    const gameplayQuat = new THREE.Quaternion().setFromRotationMatrix(lookAtMatrix);

                    // Blend pozisyon ve rotasyon
                    const finalPos = new THREE.Vector3().lerpVectors(gameplayPos, cutscenePos, cutsceneBlend);
                    const finalQuat = gameplayQuat.clone().slerp(cutsceneQuat, cutsceneBlend);

                    camera.position.copy(finalPos);
                    camera.quaternion.copy(finalQuat);
                } else {
                    // Normal gameplay kamerası
                    camera.position.set(smoothedCamPos.x, smoothedCamPos.y, smoothedCamPos.z);
                    camera.lookAt(smoothedFocusPos);
                }

                // LookAt sonrası shake ekle ki LookAt sönümlemesin (sadece cutscene değilken)
                if (cutsceneBlend < 0.5) {
                    camera.position.x += shakeX * (1 - cutsceneBlend);
                    camera.position.y += shakeY * (1 - cutsceneBlend);
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
