    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // function that sets target global position in objects local space
        function setTargetGlobalPosition(object, target) {
            if (object.parent) {
                object.parent.worldToLocal(target);
            }
            object.position.copy(target);
            object.updateMatrixWorld();
        }
        // temps (GC yok)
        const _parentWorldQuat = new THREE.Quaternion()
        const _worldQuat = new THREE.Quaternion()
        const _euler = new THREE.Euler(0, 0, 0, 'XYZ')

        function setWorldRotationXYZ(object, x, y, z) {
            _euler.set(x, y, z)
            _worldQuat.setFromEuler(_euler)

            if (!object.parent) {
                object.quaternion.copy(_worldQuat)
                return
            }

            object.parent.updateMatrixWorld(true)
            object.parent.getWorldQuaternion(_parentWorldQuat)

            // local = inverse(parent) * world
            _parentWorldQuat.invert()
            object.quaternion.copy(_parentWorldQuat).multiply(_worldQuat)
        }

        // =============================================================
        //  DISCRETE SPRITE 3D CLASS
        // =============================================================

        class DiscreteSprite3D {
            constructor(scene, camera, options = {}) {
                this.scene = scene;
                this.camera = camera;

                // Ayarlar
                this.hSteps = options.hSteps || 20; // Yatay adım sayısı (360/hSteps)
                this.vSteps = options.vSteps || 20; // Dikey adım sayısı (180/vSteps)

                // 1. Root Group (Billboard Container) - Sürekli kameraya bakar
                this.root = new THREE.Group();
                this.scene.add(this.root);

                // 2. Content Group (Child) - Ters rotasyon ve ofsetleri yönetir
                this.content = new THREE.Group();
                this.root.add(this.content);

                // Helper (Merkez Oku)
                this.helperArrow = new THREE.ArrowHelper(
                    new THREE.Vector3(0, 1, 0),
                    new THREE.Vector3(0, 0, 0),
                    1.5, 0xff0000
                );
                this.helperArrow.visible = false; // Varsayılan kapalı
                this.scene.add(this.helperArrow);

                // Hesaplama değişkenleri (Garbage collection'ı önlemek için)
                this._spherical = new THREE.Spherical();
                this._relativeVec = new THREE.Vector3();
                this._lastH = 0;
                this._lastV = 0;
            }

            /**
             * İçerik modelini değiştirir (Küp, GLB vs.)
             */
            setModel(object3D) {
                // Eski içeriği temizle
                while (this.content.children.length > 0) {
                    this.content.remove(this.content.children[0]);
                }
                this.content.add(object3D);
            }

            /**
             * Sistemin dünyadaki konumunu ayarlar
             */
            setPosition(x, y, z) {
                this.root.position.set(x, y, z);
                // Helper oku da oraya taşı
                this.helperArrow.position.copy(this.root.position);
            }

            /**
             * İçerideki modelin ofsetini ve ölçeğini ayarlar
             */
            setTransform(scale, offsetY) {
                this.content.scale.setScalar(scale);
                this.content.position.y = offsetY;
            }

            /**
             * Snap çözünürlüğünü değiştirir
             */
            setResolution(steps) {
                this.hSteps = steps;
                this.vSteps = steps; // Şimdilik kare oran koruyalım
            }

            /**
             * Helper görünürlüğünü aç/kapa
             */
            toggleHelper(visible) {
                this.helperArrow.visible = visible;
            }

            /**
             * Ana Render döngüsünde çağrılmalı.
             * Tüm matematik burada döner.
             */
            update() {
                return
                // A) Billboard Mantığı: Parent sürekli kameraya bakar
                this.root.lookAt(this.camera.position);

                // B) Açı Hesaplama: Kameranın sisteme göre bağıl vektörü
                this._relativeVec.subVectors(this.camera.position, this.root.position);
                this._spherical.setFromVector3(this._relativeVec);

                // Radyan -> Derece
                let degH = THREE.MathUtils.radToDeg(this._spherical.theta);
                if (degH < 0) degH += 360;
                let degV = THREE.MathUtils.radToDeg(this._spherical.phi);

                // C) Quantize (Snap) İşlemi
                // Hangi aralıkta olduğumuzu buluyoruz
                const stepSizeH = 360 / this.hSteps;
                const stepSizeV = 180 / this.vSteps; // Dikeyde 180 derece (0..PI)

                // Yuvarla (Snap)
                const snappedH = Math.round(degH / stepSizeH) * stepSizeH;
                const snappedV = Math.round(degV / stepSizeV) * stepSizeV;

                // D) Inverse Rotation (Tersine Çevirme)
                // Parent kameraya döndü, biz child'ı o miktarın tersine çeviriyoruz ki
                // dünya koordinatlarında "sabit" gibi dursun (snap noktaları hariç).

                // Yatay: -Angle
                this.content.rotation.y = THREE.MathUtils.degToRad(-snappedH);

                // Dikey: 90 - Angle (Phi 0 tepedir, bizim Y eksenimiz yukarı bakar)
                this.content.rotation.x = THREE.MathUtils.degToRad(90 - snappedV);

                // UI için değerleri sakla
                this._lastH = snappedH;
                this._lastV = snappedV;
            }

            /**
             * Anlık hesaplanan açıları döndürür (UI için)
             */
            getStats() {
                return { h: this._lastH, v: this._lastV };
            }

            /**
             * Kamera odağını (Target) güncellemek için sistemin pozisyonunu döndürür
             */
            getPosition() {
                return this.root.position;
            }
        }

        // =============================================================
        //  CLIMB SYSTEM CLASS
        // =============================================================
        class ClimbSystem {
            constructor(playerGroup, stopPhysicsCallback) {
                this.player = playerGroup;
                this.stopPhysics = stopPhysicsCallback;

                this.isClimbing = false;
                this.isVaulting = false;
                this.faceNormal = new THREE.Vector3();
                this.topY = 0;

                // Vault Animation State
                this.vaultTime = 0;
                this.vaultDuration = 400;
                this.vaultStartPos = new THREE.Vector3();
                this.vaultTargetPos = new THREE.Vector3();
                this.vaultStartY = 0;
                this.vaultTargetY = 0;
            }

            tryClimb(isAuto = false) {
                if (this.isVaulting) return true;

                if (this.isClimbing) {
                    if (isAuto) return false;
                    this.startVault();
                    return true;
                }

                if (collisionMeshes.length === 0) return false;

                const p = this.player.position;
                const forwardDir = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), this.player.rotation.y);

                // Karın hizasında raycast
                const waistRay = new THREE.Raycaster(new THREE.Vector3(p.x, p.y + 1.2, p.z), forwardDir, 0.1, 1.2);
                const results = waistRay.intersectObjects(collisionMeshes);

                if (results.length > 0) {
                    const hit = results[0];
                    const faceNormal = hit.face.normal.clone().applyQuaternion(hit.object.quaternion);

                    if (Math.abs(faceNormal.y) < 0.3) {
                        // Kenar kontrolü
                        const checkUp = new THREE.Raycaster(new THREE.Vector3(hit.point.x - faceNormal.x * 0.1, hit.point.y + 1.5, hit.point.z - faceNormal.z * 0.1), new THREE.Vector3(0, -1, 0), 0, 2.0);
                        const topResults = checkUp.intersectObjects(collisionMeshes);

                        if (topResults.length > 0) {
                            const topHit = topResults[0];
                            this.initiateClimb({
                                normal: faceNormal,
                                topY: topHit.point.y,
                                targetX: hit.point.x + faceNormal.x * 0.5,
                                targetZ: hit.point.z + faceNormal.z * 0.5
                            });
                            return true;
                        }
                    }
                }

                return false;
            }

            initiateClimb(data) {
                this.isClimbing = true;
                this.faceNormal.copy(data.normal);
                this.topY = data.topY;

                this.stopPhysics();

                const targetRotY = Math.atan2(-this.faceNormal.x, -this.faceNormal.z);
                this.player.rotation.set(0, targetRotY, 0);

                this.player.position.x = data.targetX;
                this.player.position.z = data.targetZ;

                const targetHangY = this.topY - 2.0;
                let jumpProgress = 0;
                const startY = this.player.position.y;
                const climbInterval = setInterval(() => {
                    if (!this.isClimbing || this.isVaulting) { clearInterval(climbInterval); return; }
                    jumpProgress += 0.1;
                    const t = Math.min(jumpProgress, 1);
                    this.player.position.y = startY + (targetHangY - startY) * t;
                    if (jumpProgress >= 1) {
                        this.player.position.y = targetHangY;
                        clearInterval(climbInterval);
                    }
                }, 16);
            }

            startVault() {
                this.isVaulting = true;
                this.isClimbing = false;
                this.vaultTime = 0;
                this.vaultStartY = this.player.position.y;
                this.vaultTargetY = this.topY;

                this.vaultStartPos.copy(this.player.position);
                const forwardDir = this.faceNormal.clone().multiplyScalar(-1);
                this.vaultTargetPos.copy(this.vaultStartPos).add(forwardDir.multiplyScalar(1.0));
            }

            update(dt) {
                if (this.isVaulting) {
                    this.vaultTime += dt;
                    const progress = Math.min(this.vaultTime / this.vaultDuration, 1);
                    const t = 1 - Math.pow(1 - progress, 3);

                    this.player.position.y = this.vaultStartY + (this.vaultTargetY - this.vaultStartY) * t;
                    this.player.position.x = this.vaultStartPos.x + (this.vaultTargetPos.x - this.vaultStartPos.x) * t;
                    this.player.position.z = this.vaultStartPos.z + (this.vaultTargetPos.z - this.vaultStartPos.z) * t;

                    updateCharacterTransform();

                    if (progress >= 1) {
                        this.isVaulting = false;
                        this.stopPhysics();
                    }
                }
            }
        }

        // =============================================================
        //  PATH MANAGER CLASS (Isolated System)
        // =============================================================
        class PathManager {
            constructor() {
                this.paths = {}; // Stores { pathName: THREE.CatmullRomCurve3 }
                this.volumes = []; // Stores camera volumes { box: Box3, target: Vector3, name: string }
                this.activePathName = null; // Aktif takip edilen rota ismi
            }

            /**
             * Aktif rotayı isimle ayarlar. Eğer null geçilirse veya isim bulunamazsa varsayılan ilk rotayı kullanır.
             */
            setActivePath(name) {
                if (name && this.paths[name]) {
                    this.activePathName = name;
                    console.log(`PathManager: Active path set to '${name}'`);
                } else {
                    this.activePathName = null;
                    console.log(`PathManager: Active path reset to default (first available)`);
                }
            }

            // Hem görsel olarak gizle hem de PathManager mantığından çıkar
            hideAllVolumes() {
                this.volumes.forEach((volume) => {
                    volume.visible = false;
                });
            }

            /**
             * Scans the given scene/object for meshes with userData.isPath = true
             * Converts them to CatmullRomCurve3 and hides the original mesh.
             */
            scan(rootObject) {
                const pathsFound = [];
                const volumesFound = [];

                rootObject.traverse((node) => {
                    // 1. PATHS
                    if (node.isMesh && node.userData.isPath === true) {
                        this._registerPath(node);
                        pathsFound.push(node.name);
                    }
                    else if (node.isMesh && node.name.startsWith('CamPath_')) {
                        this._registerPath(node);
                        pathsFound.push(node.name);
                    }

                    // 2. CAMERA & ANIMATION VOLUMES
                    // Blender'dan 'isCameraPoint' veya 'isAnimationPoint' custom property ile gelen objeler.
                    if (node.isMesh && (node.userData.isCameraPoint === true || node.userData.isAnimationPoint)) {
                        this._registerVolume(node);
                        volumesFound.push(node.name);
                    }
                });

                if (pathsFound.length > 0) {
                    console.log(`PathManager: ${pathsFound.length} paths loaded:`, pathsFound);
                }
                if (volumesFound.length > 0) {
                    console.log(`PathManager: ${volumesFound.length} camera volumes loaded:`, volumesFound);
                }
            }

            _registerPath(mesh) {
                // 1. Extract vertices from global position
                const positions = mesh.geometry.attributes.position;
                const points = [];
                const vector = new THREE.Vector3();

                // Mesh might have transforms (position/rotation/scale) from Blender
                mesh.updateWorldMatrix(true, false);

                for (let i = 0; i < positions.count; i++) {
                    vector.set(
                        positions.getX(i),
                        positions.getY(i),
                        positions.getZ(i)
                    );

                    // Convert local vertex to world space
                    vector.applyMatrix4(mesh.matrixWorld);

                    points.push(vector.clone());
                }

                // --- POINT SORTING (GREEDY NEAREST NEIGHBOR) ---
                const sortedPoints = [];
                if (points.length > 0) {
                    let current = points[0];
                    sortedPoints.push(current);
                    const remaining = points.slice(1);
                    while (remaining.length > 0) {
                        let nearestIdx = -1;
                        let minDstSq = Infinity;
                        for (let i = 0; i < remaining.length; i++) {
                            const d = current.distanceToSquared(remaining[i]);
                            // Skip duplicates
                            if (d < 0.0001) continue;
                            if (d < minDstSq) {
                                minDstSq = d;
                                nearestIdx = i;
                            }
                        }
                        if (nearestIdx !== -1) {
                            current = remaining[nearestIdx];
                            sortedPoints.push(current);
                            remaining.splice(nearestIdx, 1);
                        } else {
                            break;
                        }
                    }
                }

                // --- SIMPLIFICATION / DOWNSAMPING ---
                // Mesh faces create adjacent vertices (zigzag). We skip points that are too close.
                const simplifiedPoints = [];
                if (sortedPoints.length > 0) {
                    simplifiedPoints.push(sortedPoints[0]);
                    let lastP = sortedPoints[0];
                    const minSpacing = 0.1; // Reduced to prevent loss of detail

                    for (let i = 1; i < sortedPoints.length; i++) {
                        if (sortedPoints[i].distanceTo(lastP) > minSpacing) {
                            simplifiedPoints.push(sortedPoints[i]);
                            lastP = sortedPoints[i];
                        }
                    }
                }

                // 2. Create Curve
                // curveType: 'centripetal' is safer for irregular points
                const curve = new THREE.CatmullRomCurve3(simplifiedPoints, false, 'centripetal', 0.5);

                // 3. Register
                this.paths[mesh.name] = curve;

                // 4. Hide original mesh
                mesh.visible = false;
            }

            _registerVolume(mesh) {
                // Mesh veya Object'in world matrix'ini güncelle ki bounding box doğru hesaplansın
                mesh.updateWorldMatrix(true, false);

                // Local bounding box (Geometri üzerinden)
                if (!mesh.geometry.boundingBox) mesh.geometry.computeBoundingBox();
                const localBox = mesh.geometry.boundingBox.clone();

                // Inverse world matrix (Noktaları local space'e çekmek için)
                const invMatrix = mesh.matrixWorld.clone().invert();

                // Child obje (hedef) var mı?
                let target = null;
                if (mesh.children.length > 0) {
                    // İlk child'ı hedef al
                    const child = mesh.children[0];
                    target = new THREE.Vector3();
                    child.getWorldPosition(target);
                } else {
                    console.warn(`PathManager: Volume '${mesh.name}' has no child target! Using center.`);
                    target = new THREE.Vector3();
                    mesh.getWorldPosition(target);
                }

                // Read custom 'cameraInfluence' property (if exists)
                let influence = undefined;
                if (mesh.userData.cameraInfluence !== undefined) {
                    influence = parseFloat(mesh.userData.cameraInfluence);
                }

                this.volumes.push({
                    localBox: localBox,
                    invMatrix: invMatrix,
                    mesh: mesh, // Debug ve güncellemeler için referans tut
                    target: target,
                    influence: influence,
                    animationPoint: mesh.userData.isAnimationPoint,
                    animationPointLoop: mesh.userData.isAnimationPointLoop === true || mesh.userData.isAnimationPointLoop === 'true',
                    animationPointHaveOriginShift: mesh.userData.isAnimationPointHaveOriginShift === true || mesh.userData.isAnimationPointHaveOriginShift === 'true',
                    animationPointUseWorldOrigin: mesh.userData.isAnimationPointUseWorldOrigin === true || mesh.userData.isAnimationPointUseWorldOrigin === 'true',
                    pathName: mesh.userData.pathName || null, // Otomatik rota geçişi için
                    hasTriggered: false,
                    enabled: true, // Logic toggle
                    name: mesh.name
                });

                // Görünmez yap (hacim sadece logic için var)
                mesh.visible = false;
            }

            getPath(name) {
                return this.paths[name];
            }

            /**
             * Finds the closest point on the curve using recursive subdivision (divide & conquer).
             * This provides high precision without needing thousands of linear samples.
             */
            getClosestPoint(pathName, targetPoint) {
                // Öncelik Sırası: 
                // 1. Fonksiyona geçilen pathName
                // 2. PathManager.activePathName
                // 3. Mevcut rotalardan ilki (Geriye dönük uyumluluk)

                let name = pathName || this.activePathName;
                let curve = name ? this.paths[name] : null;

                if (!curve && !pathName) {
                    const keys = Object.keys(this.paths);
                    if (keys.length > 0) curve = this.paths[keys[0]];
                }

                if (!curve) return null;

                // 1. Initial rough scan (low samples just to find the general segment)
                // This avoids getting stuck in local minima of complex looping curves
                let minDstSq = Infinity;
                let bestT = 0;
                const divisions = 20;

                for (let i = 0; i <= divisions; i++) {
                    const t = i / divisions;
                    const pt = curve.getPoint(t);
                    const d = pt.distanceToSquared(targetPoint);
                    if (d < minDstSq) {
                        minDstSq = d;
                        bestT = t;
                    }
                }

                // 2. Recursive Refinement (Golden Section Search / Trinary Search Logic)
                // We adhere to the mathematical curve definition to find the local minimum distance.
                let startT = Math.max(0, bestT - 0.1);
                let endT = Math.min(1, bestT + 0.1);

                const iterations = 10; // High precision with few steps

                for (let i = 0; i < iterations; i++) {
                    const t1 = startT + (endT - startT) * 0.333;
                    const t2 = startT + (endT - startT) * 0.666;

                    const p1 = curve.getPoint(t1);
                    const p2 = curve.getPoint(t2);

                    const d1 = p1.distanceToSquared(targetPoint);
                    const d2 = p2.distanceToSquared(targetPoint);

                    if (d1 < d2) {
                        endT = t2;
                    } else {
                        startT = t1;
                    }
                }

                // Final result is the midpoint of the converged range
                const finalT = (startT + endT) / 2;
                const closestPt = curve.getPoint(finalT);

                return { point: closestPt, t: finalT };
            }


            // Stateful tracking for smooth movement (CONSTANT SPEED, not lerp)
            getSmoothedClosestPoint(targetPoint, currentSpherePos, speed = 0.15, pathName = null) {
                const result = this.getClosestPoint(pathName || this.activePathName, targetPoint);
                if (!result) return null;

                // Result.point is the target position on the curve
                const targetPos = result.point;
                const direction = new THREE.Vector3().subVectors(targetPos, currentSpherePos);
                const distance = direction.length();

                // If already very close, snap to target
                if (distance < 0.01) {
                    return targetPos.clone();
                }

                // Move at constant speed towards target (not lerp!)
                // "speed" is units per frame. Adjust based on desired feel.
                const moveDistance = Math.min(speed, distance);
                direction.normalize().multiplyScalar(moveDistance);

                const smoothedPos = new THREE.Vector3().copy(currentSpherePos).add(direction);
                return smoothedPos;
            }

            getVolumesAt(point) {
                const results = [];
                const pointWaist = point.clone().add(new THREE.Vector3(0, 1.0, 0));
                const tempLocalPoint = new THREE.Vector3();

                for (let volume of this.volumes) {
                    if (volume.enabled === false) continue;
                    // Feet check
                    tempLocalPoint.copy(point).applyMatrix4(volume.invMatrix);
                    if (volume.localBox.containsPoint(tempLocalPoint)) {
                        results.push(volume);
                        continue;
                    }
                    // Waist check
                    tempLocalPoint.copy(pointWaist).applyMatrix4(volume.invMatrix);
                    if (volume.localBox.containsPoint(tempLocalPoint)) {
                        results.push(volume);
                    }
                }
                return results;
            }

            getActiveVolume(point) {
                const pointWaist = point.clone().add(new THREE.Vector3(0, 1.0, 0));
                const tempLocalPoint = new THREE.Vector3();

                for (let volume of this.volumes) {
                    if (volume.enabled === false) continue;
                    // Feet
                    tempLocalPoint.copy(point).applyMatrix4(volume.invMatrix);
                    if (volume.localBox.containsPoint(tempLocalPoint)) return volume;

                    // Waist
                    tempLocalPoint.copy(pointWaist).applyMatrix4(volume.invMatrix);
                    if (volume.localBox.containsPoint(tempLocalPoint)) return volume;
                }
                return null;
            }

            setVolumeEnabled(name, enabled) {
                const vol = this.volumes.find(v => v.name === name);
                if (vol) vol.enabled = enabled;
            }

            /**
             * Helper for backward compatibility or simple target access
             */
            getActiveCameraTarget(cameraPosition) {
                const vol = this.getActiveVolume(cameraPosition);
                return vol ? vol.target : null;
            }

            /**
             * Visualization for debug
             */
            debug(scene) {
                Object.keys(this.paths).forEach(name => {
                    const curve = this.paths[name];
                    const points = curve.getPoints(20);
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);

                    // Random bright color for each path
                    const material = new THREE.LineBasicMaterial({
                        color: 0x00ff00 + Math.random() * 0xff0000
                    });

                    const curveObject = new THREE.Line(geometry, material);
                    curveObject.name = `DebugLine_${name}`;
                    scene.add(curveObject);
                });

                // Volumes Debug
                this.volumes.forEach(vol => {
                    // Mesh'in kendi geometrisini wireframe olarak göster (Scale/Rotation dahil)
                    const edges = new THREE.EdgesGeometry(vol.mesh.geometry);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffff00 }));

                    // Mesh'in dünya transformasyonunu uygula
                    line.matrixAutoUpdate = false;
                    line.matrix.copy(vol.mesh.matrixWorld);

                    scene.add(line);
                });
            }
        }

        // =============================================================
        //  DRAG SYSTEM CLASS
        // =============================================================
        class DragSystem {
            constructor(playerGroup, collisionMeshes) {
                this.player = playerGroup;
                this.collisionMeshes = collisionMeshes;
                this.isDragging = false;
                this.dragObject = null;
                this.offset = new THREE.Vector3();
            }

            tryToggleDrag() {
                if (this.isDragging) {
                    this.isDragging = false;
                    this.dragObject = null;
                    console.log("Sürükleme bırakıldı.");
                    return;
                }

                // Karakterin önünde sürüklenebilir bi şey var mı?
                const forwardDir = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), this.player.rotation.y);
                const ray = new THREE.Raycaster(new THREE.Vector3(this.player.position.x, this.player.position.y + 0.5, this.player.position.z), forwardDir, 0, 1.5);

                const results = ray.intersectObjects(this.collisionMeshes);
                if (results.length > 0) {
                    const hit = results[0];
                    if (hit.object.userData.draggable) {
                        this.isDragging = true;
                        this.dragObject = hit.object;

                        // --- SNAPPING LOGIC ---
                        // Karakteri kutunun merkezine göre en yakın eksene (X veya Z) hizala ve sabitle
                        const dragDistance = 2.0; // Parametre: Karakter ile obje merkezi arasındaki mesafe

                        const boxPos = this.dragObject.position;
                        const playerPos = this.player.position;

                        // Karakter kutunun hangi tarafında? (Fark vektörü)
                        const diff = new THREE.Vector3().subVectors(playerPos, boxPos);

                        // En baskın ekseni bul (X mi Z mi?)
                        if (Math.abs(diff.x) > Math.abs(diff.z)) {
                            // X ekseninde hizala
                            // Eğer diff.x pozitifse (+X tarafındayız), negatifse (-X tarafındayız)
                            const sign = Math.sign(diff.x) || 1;

                            // Karakteri tam X eksenine oturt
                            this.player.position.set(boxPos.x + sign * dragDistance, playerPos.y, boxPos.z);

                            // Rotasyonu kutuya bakacak şekilde ayarla 
                            // sign +1 (Sağdayız) -> Sola bakmalıyız (-PI/2)
                            // sign -1 (Soldayız) -> Sağa bakmalıyız (+PI/2)
                            this.player.rotation.y = sign > 0 ? -Math.PI / 2 : Math.PI / 2;
                        } else {

                            const sign = Math.sign(diff.z) || 1;

                            this.player.position.set(boxPos.x, playerPos.y, boxPos.z + sign * dragDistance);

                            // sign +1 (Aşağıdayız/+Z) -> İleri bakmalıyız (PI)
                            // sign -1 (Yukarıdayız/-Z) -> Geri bakmalıyız (0)
                            this.player.rotation.y = sign > 0 ? Math.PI : 0;
                        }

                        // Yeni pozisyona göre offset'i hesapla (artık sabit ve düzgün)
                        this.offset.copy(this.dragObject.position).sub(this.player.position);

                        console.log("Sürükleme başladı ve hizalandı:", hit.object.name || "Küp");
                    }
                }
            }

        function updateSwordPoints() {
            if (!colliderObject) return;

            // Collider'ın boyutlarını al
            const box = new THREE.Box3().setFromObject(colliderObject);
            const size = box.getSize(new THREE.Vector3());

            // Eğer box size çok küçükse (örn: Bone ise), varsayılan bir uzunluk ata
            if (size.lengthSq() < 0.01) {
                size.set(0.1, 1.0, 0.1); // Varsayılan uzunluk (Y ekseni baskın)
            }

            // Base her zaman origin (sap kısmı)
            basePoint.position.set(0, 0, 0);

            // Tip pozisyonunu seçilen eksene göre ayarla (HITBOX LENGTH SCALE kullanılarak)
            const s = swordSettings.swordHitboxLengthScale;

            // Eğer modelin kendi kılıç boyutu (size) 0'a yakınsa manuel bir boy verelim
            let lenX = size.x; let lenY = size.y; let lenZ = size.z;
            if (lenX < 0.1) lenX = 1.0;
            if (lenY < 0.1) lenY = 1.0;
            if (lenZ < 0.1) lenZ = 1.0;

            switch (swordSettings.swordAxis) {
                case 'X': tipPoint.position.set(lenX * s, 0, 0); break;
                case 'Y': tipPoint.position.set(0, lenY * s, 0); break;
                case 'Z': tipPoint.position.set(0, 0, lenZ * s); break;
                case '-X': tipPoint.position.set(-lenX * s, 0, 0); break;
                case '-Y': tipPoint.position.set(0, -lenY * s, 0); break;
                case '-Z': tipPoint.position.set(0, 0, -lenZ * s); break;
            }
        }

        // Tüm aktif whoosh seslerini durdur
        function stopAllWhooshSounds() {
            const now = audioCtx.currentTime;
            activeWhooshNodes.forEach(nodes => {
                try {
                    // Hızlı fade out
                    nodes.gain.gain.cancelScheduledValues(now);
                    nodes.gain.gain.setValueAtTime(nodes.gain.gain.value, now);
                    nodes.gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                    // Oscillator'ları durdur
                    setTimeout(() => {
                        try { nodes.osc1.stop(); } catch (e) { }
                        try { nodes.osc2.stop(); } catch (e) { }
                    }, 50);
                } catch (e) { }
            });
            activeWhooshNodes = [];
        }

        // Keyframe bazlı Whoosh sesi çal
        function playWhooshSound(keyframe, realAnimDuration) {
            if (!swordSettings.whooshEnabled) return;

            const now = audioCtx.currentTime;
            const percentDiff = Math.abs(keyframe.endPercent - keyframe.startPercent);
            const duration = (percentDiff / 100) * (realAnimDuration / 1000);
            const startFreq = keyframe.startFreq;
            const endFreq = keyframe.endFreq;
            const volume = keyframe.volume;

            // Oscillator 1: Ana ton
            const osc1 = audioCtx.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(startFreq, now);
            osc1.frequency.exponentialRampToValueAtTime(Math.max(endFreq, 20), now + duration);

            // Oscillator 2: Harmonik
            const osc2 = audioCtx.createOscillator();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(startFreq * 0.5, now);
            osc2.frequency.exponentialRampToValueAtTime(Math.max(endFreq * 0.5, 20), now + duration);

            // Gain envelope
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(volume, now + 0.015);
            gain.gain.linearRampToValueAtTime(volume * 0.6, now + duration * 0.4);
            gain.gain.exponentialRampToValueAtTime(0.01, now + Math.max(duration, 0.05));

            // Lowpass filter
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(startFreq * 3, now);
            filter.frequency.linearRampToValueAtTime(endFreq * 2, now + duration);
            filter.Q.value = 0.7;

            // Bağlantılar
            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + duration + 0.05);
            osc2.stop(now + duration + 0.05);

            // Aktif node'ları takip et (erken durdurma için)
            const nodeRef = { osc1, osc2, gain };
            activeWhooshNodes.push(nodeRef);

            // Süre dolunca listeden kaldır
            setTimeout(() => {
                const idx = activeWhooshNodes.indexOf(nodeRef);
                if (idx > -1) activeWhooshNodes.splice(idx, 1);
            }, (duration + 0.1) * 1000);
        }

        function playSound(type) {

                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start(now);
                osc.stop(now + 0.1);
            }
        }

        // Shockwave (Güç Dalgası) Ses Efekti
        function playShockwaveSound() {
            const now = audioCtx.currentTime;
            const duration = 0.4;

            // Derin bas oscillator
            const bassOsc = audioCtx.createOscillator();
            bassOsc.type = 'sine';
            bassOsc.frequency.setValueAtTime(80, now);
            bassOsc.frequency.exponentialRampToValueAtTime(30, now + duration);

            // Sub-bass layer
            const subOsc = audioCtx.createOscillator();
            subOsc.type = 'sine';
            subOsc.frequency.setValueAtTime(40, now);
            subOsc.frequency.exponentialRampToValueAtTime(20, now + duration);

            // Noise burst (impact texture)
            const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseData.length; i++) {
                noiseData[i] = (Math.random() * 2 - 1) * 0.3;
            }
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;

            // Gain envelopes
            const bassGain = audioCtx.createGain();
            bassGain.gain.setValueAtTime(0.5, now);
            bassGain.gain.exponentialRampToValueAtTime(0.01, now + duration);

            const subGain = audioCtx.createGain();
            subGain.gain.setValueAtTime(0.4, now);
            subGain.gain.exponentialRampToValueAtTime(0.01, now + duration);

            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.3, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);

            // Lowpass filter for noise
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.setValueAtTime(500, now);
            noiseFilter.frequency.exponentialRampToValueAtTime(100, now + 0.1);

            // Connections
            bassOsc.connect(bassGain);
            subOsc.connect(subGain);
            noiseSource.connect(noiseFilter);
            noiseFilter.connect(noiseGain);

            bassGain.connect(audioCtx.destination);
            subGain.connect(audioCtx.destination);
            noiseGain.connect(audioCtx.destination);

            // Start/Stop
            bassOsc.start(now);
            subOsc.start(now);
            noiseSource.start(now);
            bassOsc.stop(now + duration + 0.05);
            subOsc.stop(now + duration + 0.05);
            noiseSource.stop(now + 0.15);
        }

        function getGroundY(x, z, currentY) {
            if (collisionMeshes.length === 0) return 0;

            // Karakterin biraz üzerinden aşağı doğru ışın gönder
            const origin = new THREE.Vector3(x, currentY + 1.0, z);
            groundRaycaster.set(origin, downward);
            groundRaycaster.far = 100;

            const intersects = groundRaycaster.intersectObjects(collisionMeshes);
            if (intersects.length > 0) {
                // En üstteki yüzeyi bul (aslında Raycaster mesafeye göre sıralı döner, 
                // ilk çarpan en yakın/üsttekidir)
                return intersects[0].point.y;
            }
            return 0;
        }

        function tryGrabOrThrow() {
            if (heldEnemy) {
                // FIRLATMA (THROW)
                heldEnemy.userData.isHeld = false;
                heldEnemy.userData.isThrown = true; // Fırlatıldı flag'i
                heldEnemy.userData.throwTime = gameTime; // Fırlatma zamanı

                // Baktığımız yöndeki en yakın düşmanı bul (hedef olarak)
                const pPos = playerGroup.position;
                const pForward = new THREE.Vector3(Math.sin(playerGroup.rotation.y), 0, Math.cos(playerGroup.rotation.y));

                let throwTarget = null;
                let closestThrowDist = 30.0; // Max hedefleme mesafesi
                const minThrowDist = 3.0; // Minimum fırlatma mesafesi (çok yakınları atla)

                for (let enemy of enemies) {
                    if (enemy === heldEnemy) continue; // Tutulan düşman değil
                    if (enemy.userData.isDead) continue;
                    if (enemy.userData.isHeld) continue;

                    const dist = enemy.position.distanceTo(pPos);

                    // Çok yakın değilse ve daha yakınsa
                    if (dist > minThrowDist && dist < closestThrowDist) {
                        const dirToEnemy = new THREE.Vector3().subVectors(enemy.position, pPos).normalize();
                        const dot = pForward.dot(dirToEnemy);

                        // Önümüzde mi? (90 derece koni içinde)
                        if (dot > 0.0) {
                            closestThrowDist = dist;
                            throwTarget = enemy;
                        }
                    }
                }

                let throwDir;
                if (throwTarget) {
                    // Hedefe doğru fırlat (player'dan hedefe, yatay düzlem)
                    throwDir = new THREE.Vector3().subVectors(throwTarget.position, pPos);
                    throwDir.y = 0; // Yatay düzlemde tut
                    throwDir.normalize();
                } else {
                    // Hedef yok, baktığımız yöne fırlat
                    throwDir = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), playerGroup.rotation.y);
                }

                // Hız vektörünü ayarla (yatay hız sabit)
                heldEnemy.userData.velocity.copy(throwDir).multiplyScalar(swordSettings.throwForce);
                heldEnemy.userData.velocity.y = 0.5 * swordSettings.throwArcFactor; // Eğri faktörüne göre yukarı hız

                heldEnemy = null;
            } else {
                // TUTMA (GRAB)
                // En yakın düşmanı bul (açı fark etmez, sadece mesafe)
                let closestDist = 2.0; // Max tutma mesafesi
                let target = null;

                const pPos = playerGroup.position;

                for (let enemy of enemies) {
                    if (enemy.userData.isDead) continue;
                    if (enemy.userData.isHeld) continue;

                    const dist = enemy.position.distanceTo(pPos);
                    if (dist < closestDist) {
                        closestDist = dist;
                        target = enemy;
                    }
                }

                if (target) {
                    heldEnemy = target;
                    target.userData.isHeld = true;
                    target.userData.velocity.set(0, 0, 0); // Mevcut hızını sıfırla
                }
            }
        }

        // Prosedürel Zıplama
        function jump() {
            // Eğer tırmanıyorsak veya vault yapıyorsak zıplama
            if (climbSystem.isClimbing || climbSystem.isVaulting) return;
            // Sürükleme yapıyorsak zıplama

            // Zemin kontrolü
            const groundY = getGroundY(playerGroup.position.x, playerGroup.position.z, playerGroup.position.y);
            const isGrounded = (playerGroup.position.y <= groundY + 0.1);

            if (isGrounded) {
                // Dikey Kuvvet
                playerVerticalVelocity = swordSettings.jumpForce;

                // İleri Kuvvet (Karakterin baktığı yöne)
                const forwardDir = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), playerGroup.rotation.y);
                forwardDir.normalize().multiplyScalar(swordSettings.jumpForwardSpeed);

                jumpVelocity.x = forwardDir.x;
                jumpVelocity.z = forwardDir.z;

                // Animasyon Süresini Hesapla
                if (jumpAction) {
                    const gravity = 0.015;
                    const v0 = swordSettings.jumpForce;
                    const totalFrames = (2 * v0) / gravity; // Toplam havada kalış frame'i (60fps bazlı)
                    const physicsDurationSec = totalFrames / 60;
                    const animDurationSec = jumpAction.getClip().duration;

                    // Animasyonun tam fizik süresinde bitmesi için timeScale
                    jumpAction.timeScale = animDurationSec / physicsDurationSec;

                    jumpAction.reset();
                    jumpAction.play();
                }
            }
        }

        /*
        All options:
        options = {
            loop: false,
            haveOriginShift: false,
            fadeIn: 0.2,
            fadeOut: 0.2,
        }
        */

        function TriggerAnimation(animationName, options = {}) {
            const registered = animationRegistry[animationName];
            if (!registered) {
                console.warn(`TriggerAnimation: '${animationName}' not found in registry!`);
                return null;
            }

            const { clip, mixer: targetMixer, model, isCamera } = registered;
            const action = targetMixer.clipAction(clip);

            const isPlayerAnim = (model === playerModel);

            // Loop Ayarları
            const isLoop = (options.loop === true || options.loop === 'true');
            if (isLoop) {
                action.loop = THREE.LoopRepeat;
            } else {
                action.loop = THREE.LoopOnce;
                action.clampWhenFinished = options.haveOriginShift ? true : false;
            }

            // === CUTSCENE CAMERA HANDLING ===
            if (isCamera) {
                console.log(`Cutscene camera activated: ${animationName}`);
                // Önceki kamera animasyonunu tamamen durdur
                // (clampWhenFinished ile kilitlenmiş eski action'ı temizle)
                cutsceneMixer.stopAllAction();

                // CRITICAL FIX 1: Kamera animasyonları için 'fadeIn' KULLANILMAZ.
                // Çünkü biz zaten render döngüsünde 'cutsceneBlend' ile yumuşatıyoruz.
                // Three.js'in fadeIn'i, kamerayı blender'daki bind pose'undan (0,0,0) başlatıyor,
                // bu da "jump glitch" denilen o zıplamaya sebep oluyor.
                options.fadeIn = 0;
                cutsceneBlend = 0;

                cutsceneActive = true;
                cutsceneReturning = false;
                cutsceneAction = action;
            }
            // === BOSS HANDLING ===
            if (targetMixer === bossMixer) {
                console.log(`Boss animation activated: ${animationName}`);
                // bossMixer.stopAllAction();
                // bossMixer.clampWhenFinished = true;
                bossState.isFollowing = false;
            }

            // Player/Boss Animasyon Kilidi ve Origin Shift
            if (isPlayerAnim || targetMixer === bossMixer) {
                action._haveOriginShift = options.haveOriginShift || false;
                action._useWorldOrigin = options.useWorldOrigin || false;
                // CRITICAL FIX: World Origin bazlı animasyonlarda parent pos/rot sıfırlanır
                if (options.useWorldOrigin) {
                    if (isPlayerAnim) {
                        playerGroup.position.set(0, 0, 0);
                        playerGroup.rotation.set(0, 0, 0);
                        if (window.playerSprite) {
                            playerSprite.setPosition(0, 0, 0);
                            playerSprite.update();
                        }
                    } else if (targetMixer === bossMixer && bossState.mesh) {
                        // Boss zaten envModel (0,0,0) altında olduğu için genelde gerekmez
                        // ama yine de consistency için model pos/rot sıfırlanabilir
                        bossState.mesh.position.set(0, 0, 0);
                        bossState.mesh.rotation.set(0, 0, 0);
                    }
                }

                if (isPlayerAnim) {
                    playerModel.rotation.set(0, 0, 0);
                    activeTriggerAction = action;
                }
            }

            // Trigger bilgisini sakla ve hook'u çağır
            action._triggerKey = animationName;
            OnAnimationBegin(animationName, action);

            // WORLD ORIGIN GLITCH FIX: 
            // Eğer absült (world) bir animasyon ise, karakterin parent grubunu 
            // sıfır (0,0,0) noktasına çekeriz ve aradaki her türlü yumuşatmayı (fade) 
            // öldürerek anında ilk kareye kitleniriz.
            const fadeIn = options.fadeIn !== undefined ? options.fadeIn : 0.2;

            if (options.useWorldOrigin && isPlayerAnim) {
                // 1. Grubu Sıfırla
                playerGroup.position.set(0, 0, 0);
                playerGroup.quaternion.set(0, 0, 0, 1);
                playerGroup.updateMatrixWorld(true);

                // 2. Önceki tüm harmanlamaları durdur (kaymayı önlemek için)
                if (typeof currentAction !== 'undefined' && currentAction && currentAction !== action) {
                    currentAction.stop();
                }
                action.reset();
                action.setEffectiveWeight(1);
                action.play();

                currentAction = action;
                window.forceCameraSnap = true;
            } else {
                action.reset();
                if (fadeIn > 0) action.fadeIn(fadeIn);
                action.play();
            }

            // CRITICAL FIX 2: Animasyonu başlatır başlatmaz mixer'ı 0 saniye güncelle.
            // Bu, objelerin (özellikle kameranın) ilk frame'e anında oturmasını sağlar, 
            // accumulator gecikmesinden kaynaklanan 1 framelik zıplamayı önler.
            targetMixer.update(0.001); // 0 yerine küçük bir adım, iskeleti kesin hareket ettirir

            // MATRİS GÜNCELLEME: İskelet hareket ettikten sonra dünya koordinatlarını zorla hesaplat
            if (isPlayerAnim) playerModel.updateMatrixWorld(true);
            if (targetMixer === bossMixer && bossState.mesh) bossState.mesh.updateMatrixWorld(true);

            return action;
        }
